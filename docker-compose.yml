services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CASSETTE_DB_PATH: /data/cassette.sqlite3
      CASSETTE_BLOB_DIR: /data/blobs
    volumes:
      - "${CASSETTE_HOME:-./.cassette-data}:/data"

  ui:
    build:
      context: ./visualizer
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - api
