services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CASSETTE_DB_PATH: /app/api/cassette.sqlite3

  ui:
    build:
      context: ./visualizer
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - api
